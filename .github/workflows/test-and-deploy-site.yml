name: Test and deploy site

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy-site:
    name: Test and deploy site
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
    - name: "Checkout repository"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: "Test project"
      uses: pyrmont/action-janet-test@v5
    - name: "Install mendoza"
      run: |
        $PREFIX/bin/jpm install mendoza
    - name: "Merge main into gh-pages"
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git fetch origin gh-pages main
        git checkout -b gh-pages origin/gh-pages
        git merge origin/main --no-edit
    - name: "Generate site"
      run: |
        mdz clean
        mdz build docs
    - name: "Commit and push changes"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git add ./docs && git commit -am "Auto-generate site" || echo "nothing to commit"
        git push https://${GITHUB_ACTOR}:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git gh-pages
